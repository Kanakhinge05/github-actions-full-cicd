<!DOCTYPE html>
<html>
<head>
    <title>Login / Signup</title>
    <link rel="stylesheet" href="style.css">
    <script src="userStorage.js"></script>
</head>
<body class="auth auth-v2">
<main class="auth-shell" aria-label="Account access">
    <section class="auth-card">
        <div class="auth-brand">
            <div class="brand-mark" aria-hidden="true">🍴</div>
            <div>
                <div class="brand-title">My Recipe Hub</div>
                <div class="brand-sub">Sign in to search, save, and share recipes.</div>
            </div>
            <a class="brand-back" href="index.html">Back to Home</a>
        </div>

        <div id="tabs" class="seg-tabs" role="tablist" aria-label="Auth tabs">
            <button id="tab-login" class="active" type="button" role="tab" aria-selected="true">Login</button>
            <button id="tab-signup" type="button" role="tab" aria-selected="false">Signup</button>
        </div>

        <div id="login-form" class="auth-pane" role="tabpanel">
            <h2>Welcome back</h2>
            <form autocomplete="off" novalidate>
                <!-- Autofill decoys: helps prevent browsers from injecting stored credentials -->
                <input class="autofill-decoy" type="text" name="username" autocomplete="username" tabindex="-1" aria-hidden="true">
                <input class="autofill-decoy" type="password" name="password" autocomplete="current-password" tabindex="-1" aria-hidden="true">

                <label for="login-identifier">Email or username</label>
                <input type="text" id="login-identifier" name="login_identifier_nofill" required autocomplete="off" autocapitalize="off" spellcheck="false">

                <label for="login-password">Password</label>
                <div class="password-container">
                    <input type="password" id="login-password" name="login_password_nofill" required autocomplete="off">
                    <button type="button" class="toggle-password" data-target="login-password" aria-label="Toggle password visibility">Show</button>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Login</button>
                <p id="login-message" class="message"></p>
            </form>
        </div>

        <div id="signup-form" class="auth-pane" role="tabpanel" style="display:none;">
            <h2>Create your account</h2>
            <form autocomplete="off" novalidate>
                <input class="autofill-decoy" type="text" name="username" autocomplete="username" tabindex="-1" aria-hidden="true">
                <input class="autofill-decoy" type="password" name="password" autocomplete="new-password" tabindex="-1" aria-hidden="true">

                <label for="signup-username">Username</label>
                <input type="text" id="signup-username" name="signup_username_nofill" required autocomplete="off" autocapitalize="off" spellcheck="false">

                <label for="signup-email">Email (optional)</label>
                <input type="email" id="signup-email" name="signup_email_nofill" autocomplete="off" autocapitalize="off" spellcheck="false">

                <label for="signup-password">Password</label>
                <div class="password-container">
                    <input type="password" id="signup-password" name="signup_password_nofill" required autocomplete="off">
                    <button type="button" class="toggle-password" data-target="signup-password" aria-label="Toggle password visibility">Show</button>
                </div>

                <label for="signup-password2">Confirm password</label>
                <div class="password-container">
                    <input type="password" id="signup-password2" name="signup_password2_nofill" required autocomplete="off">
                    <button type="button" class="toggle-password" data-target="signup-password2" aria-label="Toggle password visibility">Show</button>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Create account</button>
                <p id="signup-message" class="message"></p>
            </form>
        </div>

        <footer class="auth-footer">
            <span>© 2026 My Recipe Book</span>
            <span class="muted">Local-only demo login</span>
        </footer>
    </section>
</main>
<script>
(function(){
    const loginTab = document.getElementById('tab-login');
    const signupTab = document.getElementById('tab-signup');
    const loginForm = document.getElementById('login-form');
    const signupForm = document.getElementById('signup-form');
    loginTab.addEventListener('click',()=>{
        loginTab.classList.add('active');
        signupTab.classList.remove('active');
        loginTab.setAttribute('aria-selected','true');
        signupTab.setAttribute('aria-selected','false');
        loginForm.style.display='block';
        signupForm.style.display='none';
    });
    signupTab.addEventListener('click',()=>{
        signupTab.classList.add('active');
        loginTab.classList.remove('active');
        signupTab.setAttribute('aria-selected','true');
        loginTab.setAttribute('aria-selected','false');
        signupForm.style.display='block';
        loginForm.style.display='none';
    });

    // use UserStorage abstraction
    function getUsers(){ return UserStorage.getUsers(); }
    function saveUsers(users){ return UserStorage.saveUsers(users); }
    function findUser(identifier){ return UserStorage.findUser(identifier); }

    document.querySelector('#login-form form').addEventListener('submit',e=>{
        e.preventDefault();
        const id=document.getElementById('login-identifier').value.trim();
        const pw=document.getElementById('login-password').value;
        const msg=document.getElementById('login-message');
        const user=findUser(id);
        if(user && user.password===pw){
            UserStorage.setLoggedIn(user);
            window.location.href='index.html';
        } else {
            msg.textContent='Invalid credentials';
        }
    });

    document.querySelector('#signup-form form').addEventListener('submit',e=>{
        e.preventDefault();
        const username=document.getElementById('signup-username').value.trim();
        const email=document.getElementById('signup-email').value.trim();
        const pw=document.getElementById('signup-password').value;
        const pw2=document.getElementById('signup-password2').value;
        const msg=document.getElementById('signup-message');
        if(pw!==pw2){
            msg.textContent='Passwords do not match';
            return;
        }
        if(findUser(username)|| (email && findUser(email))){
            msg.textContent='User already exists';
            return;
        }
        const user={username,email,password:pw};
        UserStorage.addUser(user);
        UserStorage.setLoggedIn(user);
        window.location.href='index.html';
    });

    // toggle password visibility
    document.querySelectorAll('.toggle-password').forEach(btn=>{
        btn.addEventListener('click',()=>{
            const target = document.getElementById(btn.dataset.target);
            if(target.type==='password'){
                target.type='text';
                btn.textContent='Hide';
            } else {
                target.type='password';
                btn.textContent='Show';
            }
        });
    });

    // Hard-stop against autofill: clear any injected values on load.
    // Some browsers ignore `autocomplete="off"` for login forms.
    const wipe = () => {
        ['login-identifier','login-password','signup-username','signup-email','signup-password','signup-password2']
            .forEach(id => {
                const el = document.getElementById(id);
                if(el) el.value = '';
            });
    };
    wipe();
    setTimeout(wipe, 0);

})();
</script>
</body>
</html>
