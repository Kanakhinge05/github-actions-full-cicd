<!DOCTYPE html>
<html>
<head>
    <title>Account</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="recipes-page account-page">
<script>
    // redirect if not logged in
    const logged = localStorage.getItem('loggedIn');
    if(!logged){
        window.location.href='login.html';
    }
</script>

<header class="masthead">
    <h1>Account</h1>
    <p>Your profile and your recipes</p>
</header>

<nav class="topnav" aria-label="Primary">
    <div class="nav-inner container">
        <div class="nav-links">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="search.html">Search</a>
            <a class="nav-link" href="recipes.html">All Recipes</a>
            <a class="nav-link" href="add-recipe.html">Add Recipe</a>
            <a class="nav-link" href="account.html">Account</a>
        </div>
        <div id="auth-info" class="nav-auth"></div>
    </div>
</nav>
<script>
    (function(){
        const info = document.getElementById('auth-info');
        const user = JSON.parse(localStorage.getItem('loggedIn'));
        if(user){
            const name = user.username || user.email || 'Account';
            info.innerHTML = `
                <span class="auth-pill">Hello <strong>${name}</strong></span>
                <a class="nav-link nav-logout" href="#" id="logout-btn">Logout</a>
            `;
            document.getElementById('logout-btn').addEventListener('click',(e)=>{
                e.preventDefault();
                localStorage.removeItem('loggedIn');
                window.location.href='login.html';
            });
        }
    })();
</script>

<main class="container">
    <section class="card account-grid">
        <div class="profile-card">
            <h2 class="section-title">Profile</h2>
            <div id="profile"></div>
        </div>
        <div class="profile-card">
            <h2 class="section-title">Recipe Stats</h2>
            <div class="hero-stats" id="account-stats"></div>
        </div>
    </section>

    <section class="card list-shell">
        <div class="card-head">
            <h3>My Recipes</h3>
            <a class="btn btn-primary" href="add-recipe.html">Add</a>
        </div>
        <div id="my-recipes"></div>
        <p class="muted">Only recipes you created show up here.</p>
    </section>
</main>

<script src="account.js"></script>
</body>
</html>
