<!DOCTYPE html>
<html>
<head>
    <title>Search Recipes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="recipes-page search-page">
<script>
    // redirect if not logged in
    const logged = localStorage.getItem('loggedIn');
    if(!logged){
        window.location.href='login.html';
    }
</script>

<header class="masthead">
    <h1>Search Recipes</h1>
    <p>Find recipes by name, ingredient, tag, and pantry match</p>
</header>

<nav class="topnav" aria-label="Primary">
    <div class="nav-inner container">
        <div class="nav-links">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="search.html">Search</a>
            <a class="nav-link" href="recipes.html">All Recipes</a>
            <a class="nav-link" href="add-recipe.html">Add Recipe</a>
            <a class="nav-link" href="account.html">Account</a>
        </div>
        <div id="auth-info" class="nav-auth"></div>
    </div>
</nav>
<script>
    (function(){
        const info = document.getElementById('auth-info');
        const user = JSON.parse(localStorage.getItem('loggedIn'));
        if(user){
            const name = user.username || user.email || 'Account';
            info.innerHTML = `
                <span class="auth-pill">Hello <strong>${name}</strong></span>
                <a class="nav-link nav-logout" href="#" id="logout-btn">Logout</a>
            `;
            document.getElementById('logout-btn').addEventListener('click',(e)=>{
                e.preventDefault();
                localStorage.removeItem('loggedIn');
                window.location.href='login.html';
            });
        }
    })();
</script>

<main class="container">
    <section id="smart-tools" class="tools card">
        <h2>Smart Search</h2>
        <div class="tools-grid">
            <div class="tool-block">
                <label for="search"><strong>Search</strong></label>
                <input type="text" id="search" placeholder="Search by recipe name, ingredient, tag...">
            </div>

            <div class="tool-block">
                <label for="pantry-input"><strong>My Pantry</strong> (comma or newline separated)</label>
                <textarea id="pantry-input" rows="3" placeholder="e.g. garlic, tomato, milk"></textarea>
                <div class="tool-actions">
                    <button type="button" id="save-pantry">Apply pantry</button>
                    <label class="inline-check">
                        <input type="checkbox" id="only-makeable">
                        Only show recipes I can make
                    </label>
                </div>
            </div>

            <div class="tool-block">
                <strong>Avoid Allergens</strong>
                <div class="checks">
                    <label><input type="checkbox" name="exclude-allergen" value="dairy"> Dairy</label>
                    <label><input type="checkbox" name="exclude-allergen" value="gluten"> Gluten</label>
                    <label><input type="checkbox" name="exclude-allergen" value="nuts"> Nuts</label>
                    <label><input type="checkbox" name="exclude-allergen" value="eggs"> Eggs</label>
                    <label><input type="checkbox" name="exclude-allergen" value="soy"> Soy</label>
                    <label><input type="checkbox" name="exclude-allergen" value="seafood"> Seafood</label>
                </div>
                <div class="tool-actions">
                    <button type="button" id="open-shopping">Shopping list</button>
                    <button type="button" id="clear-filters" class="btn-secondary">Clear filters</button>
                </div>
            </div>
        </div>
        <p class="muted">Tip: you can share links like <code>search.html?q=pasta</code>.</p>
    </section>

    <section class="card list-shell">
        <div class="card-head">
            <h3>Results</h3>
            <a class="btn btn-ghost" href="add-recipe.html">Add a recipe</a>
        </div>
        <section id="recipe-list">
            <!-- recipes will be injected here by JavaScript -->
        </section>
    </section>
</main>

<div id="shopping-overlay" class="overlay hidden" aria-hidden="true"></div>
<aside id="shopping-drawer" class="drawer hidden" aria-hidden="true">
    <div class="drawer-header">
        <strong>Shopping List</strong>
        <button type="button" id="close-shopping" class="btn-icon" aria-label="Close">✖</button>
    </div>
    <div class="drawer-controls">
        <label>
            Scope:
            <select id="shopping-scope">
                <option value="selected">Selected recipes</option>
                <option value="all">All recipes</option>
            </select>
        </label>
        <label class="inline-check">
            <input type="checkbox" id="shopping-exclude-pantry" checked>
            Exclude pantry items
        </label>
        <button type="button" id="copy-shopping" class="btn-secondary">Copy</button>
    </div>
    <pre id="shopping-text" class="drawer-body"></pre>
</aside>

<script src="recipes.js"></script>
</body>
</html>
